plugins {
    id 'com.android.application'
}

// Voice segments are generated by the voice pipeline (voice/pipeline.py)
// and packaged directly into app/src/main/assets/voice_segments/ by stage 3.
// No build-time copy task needed — the pipeline writes to the assets directory.

android {
    namespace "com.jsd.x761.growler.Growler"
    compileSdk 35

    defaultConfig {
        applicationId 'com.jsd.x761.growler.Growler'
        minSdk 33
        targetSdk 35
        versionCode 34
        versionName '1.33'

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        buildConfig true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    androidResources {
        noCompress 'wav'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    implementation 'androidx.wear:wear:1.2.0'
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    implementation project(path: ':DS1Library-debug')
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation 'org.mockito:mockito-core:5.8.0'
    testImplementation 'org.json:json:20231013'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    compileOnly 'com.google.android.wearable:wearable:2.9.0'
}
